<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a" />
      <stop offset="1" stop-color="#1a1a1a" />
    </linearGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06b6d4" />
      <stop offset="1" stop-color="#67e8f9" />
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="70" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Ambient orbs -->
  <circle cx="300" cy="190" r="200" fill="#06b6d4" opacity="0.3" filter="url(#blur)" />
  <circle cx="960" cy="500" r="175" fill="#22d3ee" opacity="0.25" filter="url(#blur)" />

  <!-- Content -->
  <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <text x="600" y="250" font-size="80" font-weight="bold" fill="#f5f5f5">
      Hi, I'm <tspan fill="url(#name)">Atul</tspan>
    </text>
    <text x="600" y="320" font-size="40" font-weight="600" fill="#06b6d4">
      Software Engineering Student
    </text>
    <text x="600" y="380" font-size="28" fill="#cbd5e1">
      Building innovative solutions through cloud computing,
    </text>
    <text x="600" y="418" font-size="28" fill="#cbd5e1">
      machine learning, and robotics
    </text>
  </g>

  <!-- Tags -->
  <g font-family="system-ui, sans-serif" font-size="20" font-weight="500" fill="#06b6d4" text-anchor="middle">
    <rect x="360" y="470" width="230" height="52" rx="12" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-opacity="0.3" stroke-width="2" />
    <text x="475" y="503">McMaster University</text>
    <rect x="610" y="470" width="250" height="52" rx="12" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-opacity="0.3" stroke-width="2" />
    <text x="735" y="503">Summer 2026 Internships</text>
  </g>
</svg>
